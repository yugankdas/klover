            // runtime/runtime.js - V8 with Diffing Support
class Runtime {
    constructor(ast, components = {}) {
        this.ast = ast;
        this.components = components;
        this.state = {};
        this.onRender = null;

        // V8: Track previous tree for diffing
        this.previousTree = null;
        this.currentTree = null;
    }

    // -------------------------
    // INIT STATE
    // -------------------------
    init() {
        this.extractState(this.ast);
    }

    extractState(node) {
        if (!node) return;

        if (node.type === "state") {
            this.state[node.key] = node.value;
        }

        if (node.children) {
            node.children.forEach(child => this.extractState(child));
        }

        // Also extract from components
        if (node.type === "component" && this.components[node.name]) {
            this.extractState(this.components[node.name].root);
        }
    }

    // -------------------------
    // EVALUATE EXPRESSIONS
    // -------------------------
    evaluate(expr, scope = {}) {
        const context = { ...this.state, ...scope };
        const keys = Object.keys(context);
        const values = Object.values(context);

        try {
            // Handle chained operations (a & b & c)
            if (typeof expr === 'string' && expr.includes('&')) {
                const parts = expr.split('&');
                let lastResult = null;
                for (const part of parts) {
                    const fn = new Function(...keys, "return " + part.trim());
                    lastResult = fn(...values);
                }
                return lastResult;
            }
            return new Function(...keys, "return " + expr.trim())(...values);
        } catch (e) {
            console.error("Evaluation Error:", e, "Expression:", expr);
            return null;
        }
    }

    // -------------------------
    // STATE MANAGEMENT
    // -------------------------
    setState(target, expression) {
        let finalExpr = expression;
        let actualTarget = target;

        if (expression.includes("=")) {
            const parts = expression.split("=");
            actualTarget = parts[0].trim();
            finalExpr = parts[1].trim();
        }

        const newValue = this.evaluate(finalExpr);
        if (newValue !== null && newValue !== undefined) {
            this.state[actualTarget] = newValue;
            console.log(`🔄 State updated: ${actualTarget} = ${newValue}`);
        }

        // Trigger re-render with new tree
        if (this.onRender) {
            const newTree = this.resolveTree();
            this.onRender(newTree);
        }
    }

    executeOperations(operations, scope = {}) {
        if (!Array.isArray(operations)) return;
        
        let changed = false;
        operations.forEach(op => {
            const newValue = this.evaluate(op.expression, scope);
            if (newValue !== null && newValue !== undefined) {
                const cleanTarget = op.target.trim();
                if (this.state[cleanTarget] !== newValue) {
                    this.state[cleanTarget] = newValue;
                    console.log(`🔄 Operation: ${cleanTarget} = ${newValue}`);
                    changed = true;
                }
            }
        });

        if (changed && this.onRender) {
            const newTree = this.resolveTree();
            this.onRender(newTree);
        }
    }

    // -------------------------
    // V8: DIFF TWO TREES
    // -------------------------
    diffTree(oldTree, newTree, changes = [], path = "") {
        if (!oldTree && !newTree) return changes;
        if (!oldTree) {
            changes.push({ type: "added", path, node: newTree });
            return changes;
        }
        if (!newTree) {
            changes.push({ type: "removed", path, node: oldTree });
            return changes;
        }

        // Different types
        if (oldTree.type !== newTree.type) {
            changes.push({ type: "replaced", path, old: oldTree, new: newTree });
            return changes;
        }

        // Text nodes - check value change
        if (oldTree.type === "text" && oldTree.value !== newTree.value) {
            changes.push({
                type: "changed",
                path: path ? `${path}.value` : "value",
                old: oldTree.value,
                new: newTree.value
            });
        }

        // Button nodes - check label change
        if (oldTree.type === "button" && oldTree.label !== newTree.label) {
            changes.push({
                type: "changed",
                path: path ? `${path}.label` : "label",
                old: oldTree.label,
                new: newTree.label
            });
        }

        // Recursively check children
        const oldChildren = oldTree.children || [];
        const newChildren = newTree.children || [];
        const maxLen = Math.max(oldChildren.length, newChildren.length);

        for (let i = 0; i < maxLen; i++) {
            const newPath = path ? `${path}.children[${i}]` : `children[${i}]`;
            this.diffTree(oldChildren[i], newChildren[i], changes, newPath);
        }

        return changes;
    }

    // -------------------------
    // CORE: RESOLVE NODE
    // -------------------------
    resolveNode(node, scope = {}) {
        if (!node) return null;

        let resolved = null;

        // -------------------------
        // STATE (Non-visual)
        // -------------------------
        if (node.type === "state") {
            return null;
        }
        
        else if (node.type === "component") {
            const comp = this.components[node.name];
            if (!comp || !comp.root) return null;

            // Evaluate props in current scope
            const resolvedProps = {};
            if (node.props) {
                for (const [key, expr] of Object.entries(node.props)) {
                    const val = this.evaluate(String(expr), scope);
                    resolvedProps[key] = val !== null ? val : expr;
                }
            }

            // Merge resolved props with existing scope
            const mergedScope = { ...scope, ...resolvedProps };
            resolved = this.resolveNode(comp.root, mergedScope);
        }

        // -------------------------
        // TEXT (VARIABLE/EXPRESSION)
        // -------------------------
        else if (node.type === "text" && node.isVariable) {
            const value = this.evaluate(node.value, scope);
            resolved = {
                ...node,
                value: value !== null && value !== undefined ? value : "",
                isVariable: false
            };
        }

        // -------------------------
        // IMAGE & VIDEO
        // -------------------------
        else if ((node.type === "image" || node.type === "video") && node.isVariable) {
            const value = this.evaluate(node.src, scope);
            resolved = {
                ...node,
                src: value !== null && value !== undefined ? value : "",
                isVariable: false
            };
        }

        // -------------------------
        // IF CONDITIONAL
        // -------------------------
        else if (node.type === "if") {
            const result = this.evaluate(node.condition, scope);
            if (!result) return null;

            resolved = {
                type: "fragment",
                children: node.children
                    .map(child => this.resolveNode(child, scope))
                    .filter(Boolean)
            };
        }

        // -------------------------
        // REPEAT LOOP
        // -------------------------
        else if (node.type === "repeat") {
            const list = this.state[node.source] || [];
            const expanded = [];

            list.forEach((item, index) => {
                const newScope = {
                    ...scope,
                    [node.itemName]: item,
                    index: index
                };

                node.children.forEach(child => {
                    const resChild = this.resolveNode(child, newScope);
                    if (resChild) expanded.push(resChild);
                });
            });

            resolved = {
                type: "fragment",
                children: expanded
            };
        }

        // -------------------------
        // GENERIC NODE (with children)
        // -------------------------
        else if (node.children) {
            resolved = {
                ...node,
                children: node.children
                    .map(child => this.resolveNode(child, scope))
                    .filter(Boolean)
            };
        }

        // -------------------------
        // LEAF NODE (no children)
        // -------------------------
        else {
            resolved = { ...node };
        }

        // BAKE SCOPE INTO NODES WITH EVENTS
        if (resolved && node.events) {
            resolved._scope = { ...scope };
        }

        return resolved;
    }

    // -------------------------
    // V8: ENTRY POINT with tracking
    // -------------------------
    resolveTree() {
        // Store previous tree before resolving new one
        const oldTree = this.currentTree;

        // Resolve new tree
        const newTree = this.resolveNode(this.ast);

        // Store for next diff
        this.previousTree = oldTree;
        this.currentTree = newTree;

        // Calculate diff if we have both trees
        let changes = null;
        if (this.previousTree && this.currentTree) {
            changes = this.diffTree(this.previousTree, this.currentTree);
            if (changes.length > 0) {
                console.log(`📊 V8 Diff: ${changes.length} change(s) detected`);
                changes.forEach(change => {
                    console.log(`   - ${change.type}: ${change.path || ''}`,
                        change.old !== undefined ? `"${change.old}" → "${change.new}"` : '');
                });
            }
        }

        // Attach changes to result for renderer optimization
        if (changes && changes.length > 0) {
            newTree._changes = changes;
        }

        return newTree;
    }

    // -------------------------
    // HELPER: Get current state
    // -------------------------
    getState() {
        return { ...this.state };
    }

    // -------------------------
    // HELPER: Set multiple states at once
    // -------------------------
    setMultipleState(updates) {
        let changed = false;
        for (const [key, value] of Object.entries(updates)) {
            if (this.state[key] !== value) {
                this.state[key] = value;
                changed = true;
            }
        }
        if (changed && this.onRender) {
            const newTree = this.resolveTree();
            this.onRender(newTree);
        }
    }

    // -------------------------
    // HELPER: Reset all state
    // -------------------------
    resetState() {
        const keys = Object.keys(this.state);
        for (const key of keys) {
            delete this.state[key];
        }
        this.extractState(this.ast);
        if (this.onRender) {
            const newTree = this.resolveTree();
            this.onRender(newTree);
        }
    }
}


            window.Runtime = Runtime;

            // renderer/render.js - V8 Diff-Ready Renderer (FIXED)

// Helper: Escape HTML to prevent XSS attacks
function escapeHtml(str) {
    if (str === undefined || str === null) return "";
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

// Helper: Convert props to CSS classes and styles
function applyProps(node, theme = {}) {
    // FIX: Check if node exists and has props
    if (!node) return { class: "", style: "" };
    if (!node.props) return { class: "", style: "" };

    const props = node.props;
    let classes = [];
    let styles = [];

    // Size mapping
    const sizeMap = {
        xs: "text-xs", sm: "text-sm", md: "text-base",
        lg: "text-lg", xl: "text-xl", "2xl": "text-2xl",
        "3xl": "text-3xl", "4xl": "text-4xl"
    };

    // Weight mapping
    const weightMap = {
        normal: "font-normal", medium: "font-medium",
        semibold: "font-semibold", bold: "font-bold",
        extrabold: "font-extrabold"
    };

    // Apply size
    if (props.size && sizeMap[props.size]) {
        classes.push(sizeMap[props.size]);
    }

    // Apply weight
    if (props.weight && weightMap[props.weight]) {
        classes.push(weightMap[props.weight]);
    }

    // Apply primary button styling
    if (props.primary === true || props.primary === "true") {
        classes.push("btn-primary");
        classes.push("px-4", "py-2", "rounded-lg", "cursor-pointer");
    }

    // Apply danger button styling
    if (props.danger === true || props.danger === "true") {
        classes.push("btn-danger");
    }

    // Apply gap for flex containers
    if (props.gap !== undefined) {
        styles.push(`gap: ${typeof props.gap === 'number' ? props.gap + 'px' : props.gap}`);
    }

    // Apply theme colors
    if (theme && theme.primary && !props.primary) {
        classes.push(`text-[${theme.primary}]`);
    }

    return {
        class: classes.length ? ` class="${classes.join(' ')}"` : "",
        style: styles.length ? ` style="${styles.join('; ')}"` : ""
    };
}

// Main render function - converts node to HTML string
function renderNode(node, runtime, theme = {}, path = "") {
    // Handle null/undefined
    if (!node) return "";

    const pathAttr = path ? ` data-kv-path="${path}"` : "";

    // --------------------------------------------
    // TEXT NODE
    // --------------------------------------------
    if (node.type === "text") {
        const attrs = applyProps(node, theme);
        const value = escapeHtml(node.value);
        return `<p${pathAttr}${attrs.class}${attrs.style}>${value}</p>`;
    }

    // --------------------------------------------
    // BUTTON NODE
    // --------------------------------------------
    if (node.type === "button") {
        const attrs = applyProps(node, theme);
        const label = escapeHtml(node.label || "Button");

        // Build click handler
        let onclick = "";
        if (node.events?.click?.operations) {
            const ops = JSON.stringify(node.events.click.operations).replace(/"/g, '&quot;');
            const scope = JSON.stringify(node._scope || {}).replace(/"/g, '&quot;');
            onclick = ` onclick="window.__klover_executeOperations('${ops}', '${scope}')"`;
        }

        return `<button${pathAttr}${attrs.class}${attrs.style}${onclick}>${label}</button>`;
    }

    // --------------------------------------------
    // VIDEO NODE
    // --------------------------------------------
    if (node.type === "video") {
        const attrs = applyProps(node, theme);
        const src = escapeHtml(node.src || "");

        let videoAttrs = ` src="${src}"`;
        if (node.props?.controls) videoAttrs += " controls";
        if (node.props?.autoplay) videoAttrs += " autoplay";
        if (node.props?.loop) videoAttrs += " loop";
        if (node.props?.muted) videoAttrs += " muted";

        return `<video${pathAttr}${videoAttrs}${attrs.class}${attrs.style}></video>`;
    }

    // --------------------------------------------
    // IMAGE NODE
    // --------------------------------------------
    if (node.type === "image") {
        const attrs = applyProps(node, theme);
        const src = escapeHtml(node.src || "");
        return `<img${pathAttr} src="${src}"${attrs.class}${attrs.style} />`;
    }

    // --------------------------------------------
    // COLUMN NODE (Vertical Flex Container)
    // --------------------------------------------
    if (node.type === "column") {
        const attrs = applyProps(node, theme);

        let children = "";
        if (node.children && Array.isArray(node.children)) {
            children = node.children.map((child, i) => {
                const childPath = path ? `${path}.children[${i}]` : `children[${i}]`;
                return renderNode(child, runtime, theme, childPath);
            }).join("");
        }

        const baseStyle = "display:flex;flex-direction:column;align-items:center;";
        const existingStyle = attrs.style ? attrs.style.replace('style="', '') : '';

        return `<div${pathAttr}${attrs.class} style="${baseStyle}${existingStyle}">${children}</div>`;
    }

    // --------------------------------------------
    // ROW NODE (Horizontal Flex Container)
    // --------------------------------------------
    if (node.type === "row") {
        const attrs = applyProps(node, theme);

        let children = "";
        if (node.children && Array.isArray(node.children)) {
            children = node.children.map((child, i) => {
                const childPath = path ? `${path}.children[${i}]` : `children[${i}]`;
                return renderNode(child, runtime, theme, childPath);
            }).join("");
        }

        const baseStyle = "display:flex;flex-direction:row;align-items:center;flex-wrap:wrap;";
        const existingStyle = attrs.style ? attrs.style.replace('style="', '') : '';

        return `<div${pathAttr}${attrs.class} style="${baseStyle}${existingStyle}">${children}</div>`;
    }

    // --------------------------------------------
    // FRAGMENT NODE (No wrapper, just children)
    // --------------------------------------------
    if (node.type === "fragment") {
        if (node.children && Array.isArray(node.children)) {
            return node.children.map((child, i) => {
                const childPath = path ? `${path}.children[${i}]` : `children[${i}]`;
                return renderNode(child, runtime, theme, childPath);
            }).join("");
        }
        return "";
    }

    // --------------------------------------------
    // CUSTOM NODE (Ignore gracefully, don't crash)
    // --------------------------------------------
    if (node.type === "custom") {
        console.warn(`Custom node "${node.name}" not supported, skipping`);
        return `<!-- Custom node: ${node.name} -->`;
    }

    // --------------------------------------------
    // UNKNOWN NODE (Log warning, return empty)
    // --------------------------------------------
    if (node.type !== "text" && node.type !== "button" && node.type !== "video" &&
        node.type !== "image" && node.type !== "column" && node.type !== "row" &&
        node.type !== "fragment" && node.type !== "custom") {
        console.warn(`Unknown node type: ${node.type}`);
    }

    return "";
}

// V8 Diff-Ready Render Function
function render(newTree, options = {}) {
    const { runtime, theme = {}, oldTree = null } = options;

    // Validate runtime
    if (!runtime) {
        console.error("❌ No runtime provided to renderer");
        return "<div>Error: No runtime provided</div>";
    }

    // Resolve the tree (expand variables, components, loops)
    let resolvedTree = newTree;
    if (runtime.resolveTree) {
        resolvedTree = runtime.resolveTree();
    } else if (runtime.resolveNode) {
        resolvedTree = runtime.resolveNode(newTree);
    }
